openapi: 3.0.4
info:
  title: Swagger Altenar-Calimaco API's
  description: Endpoints para Alternar
  termsOfService: https://swagger.io/terms/
  contact:
    email: apiteam@swagger.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
  - description: SwaggerHub API Auto Mocking
    url: https://app-altenar.acity.com.pe/
security:
  - bearerAuth: []
paths:
  /login:
    post:
      tags:
        - auth
      summary: User login
      description: Allows you to log in with valid Atlantic City credentials
      operationId: login
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Auth"
        required: true
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  IdToken:
                    type: string
                    description: Token JWT de identificación.
                  RefreshToken:
                    type: string
                    description: Token para refrescar la sesión.
                  ExpiresIn:
                    type: integer
                    description: Tiempo en segundos antes de la expiración del token.
                    example: 3600
                  user:
                    type: object
                    properties:
                      alias:
                        type: string
                        example: Testprueba90
                      user:
                        type: integer
                        example: 389382
                      email:
                        type: string
                        format: email
                        example: sdjhduygsuad@gmail.com
                      status:
                        type: string
                        example: REGISTERED
                      db:
                        type: integer
                        example: 2
                      country:
                        type: string
                        example: US
                      lastLogin:
                        type: string
                        format: date-time
                        example: 2025-07-17 20:58:04
                      company:
                        type: string
                        example: ACP
                      national_id:
                        type: string
                        example: "48494774"
                      ip_login_errors:
                        type: integer
                        example: 0
                      otp:
                        type: string
                        nullable: true
                      facebook_id:
                        type: string
                        nullable: true
                      google_id:
                        type: string
                        nullable: true
                      client_device:
                        type: string
                        example: D
                      groups:
                        type: array
                        items:
                          type: integer
                        example: [3, 5, 11, 20]
                      currency:
                        type: string
                        example: PEN
        "400":
          description: Invalid or missing data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingParameters:
                  summary: Parámetros faltantes
                  value:
                    message: "Completar los campos obligatorios"
                invalidCredentials:
                  summary: Credenciales incorrectas
                  value:
                    message: "Usuario o clave incorrecta"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado

  /logout:
    post:
      tags:
        - auth
      summary: Logout de usuario
      description: Cierra la sesión del usuario autenticado
      operationId: logout
      responses:
        "200":
          description: Session closed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    description: ""
                  event:
                    type: string
                    description: ""
                  ip:
                    type: string
                    description: ""
                  result:
                    type: string
                    description: ""
                  user:
                    type: object
        "400":
          description: Invalid or missing data
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: No se encontró la sesión en el token
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sin Autorización
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado

  /refresh-token:
    post:
      tags:
        - auth
      summary: Refresh token
      description: Allows you to log in with valid Atlantic City credentials
      operationId: refresh-token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                RefreshToken:
                  type: string
                  description: Token para refrescar la sesión.
        required: true
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  IdToken:
                    type: string
                    description: Token JWT de identificación.
        "400":
          description: Invalid or missing data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingParameters:
                  summary: Parámetros faltantes
                  value:
                    message: "Completar los campos obligatorios"
                invalidRefreshToken:
                  summary: Refresh Token inválido
                  value:
                    message: "El Refresh Token no es valido"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sin Autorización
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado

  /forgot-password:
    post:
      tags:
        - change-password
      summary: Recover password
      description: Send an email to recover the user's password
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: TestStark09@gmail.com
      responses:
        "200":
          description: Session closed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    description: ""
                  company:
                    type: string
                    description: ""
                  event:
                    type: string
                    description: ""
                  ip:
                    type: string
                    description: ""
                  result:
                    type: string
                    description: ""
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Completar los campos obligatorios

        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado
        "504":
          description: Service Unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Timeout - No response from server

  /update-password:
    patch:
      tags:
        - change-password
      summary: Actualizar contraseña del usuario
      description: Permite cambiar la contraseña del usuario autenticado enviando la contraseña antigua y la nueva
      operationId: updatePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - old_password
                - new_password
              properties:
                old_password:
                  type: string
                  example: Testprueba90
                new_password:
                  type: string
                  example: 01Testprueba90
      responses:
        "200":
          description: Session closed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    description: ""
                  company:
                    type: string
                    description: ""
                  event:
                    type: string
                    description: ""
                  ip:
                    type: string
                    description: ""
                  result:
                    type: string
                    description: ""
        "400":
          description: Invalid or missing data
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Completar los campos obligatorios
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sin Autorización
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado

  /get-user-detail:
    get:
      tags:
        - get-user-detail
      summary: Obtener datos adicionales del usuario
      description: Permite obtener la información detallada del usuario
      operationId: getUserDetail
      responses:
        "200":
          description: Valid Session successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetailsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sin Autorización
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado

  /data/user-accounts:
    get:
      tags:
        - data
      summary: Obtener los distintos tipos de cuentas de un usuario
      description: Permite listar la información de las multiples cuentas de un usuario
      operationId: getUserAccounts
      responses:
        "200":
          description: Valid Session successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAccountsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sin Autorización
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado
  
  /data/get-user-active-promotions:
    post:
      tags:
        - data
      summary: Obtener promociones activas de un usuario
      description: Retorna las promociones activas de un usuario autenticado.
      operationId: getUserActivePromotions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                limits:
                  type: string
                  example: '{"init":0,"end":20}'
                  description: Rango de resultados a devolver.
                filter:
                  type: string
                  example: '{"op_date_init":"","op_date_end":"","promotion":""}'
                  description: Filtros de búsqueda (fechas, promoción, etc).
      responses:
        "200":
          description: Valid Session successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserActivePromotionsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sin Autorización
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado

  /data/get-user-pending-promotions:
    post:
      tags:
        - data
      summary: Obtener promociones pendientes del usuario
      description: >
        Devuelve el listado de promociones pendientes del usuario autenticado.  
        Requiere autenticación mediante **Bearer Token**.
      operationId: getUserPendingPromotions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                limits:
                  type: string
                  example: '{"init":0,"end":20}'
                  description: Rango de resultados (inicio y fin).
                filter:
                  type: string
                  example: '{"op_date_init":"","op_date_end":"","promotion":""}'
                  description: Filtros opcionales (fechas y nombre de promoción).
      responses:
        "200":
          description: Valid Session successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPendingPromotionsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sin Autorización
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado
  
  /data/claim-code-promotion:
    post:
      tags:
        - data
      summary: Reclamar código de promoción
      description: Endpoint para que el usuario reclame un código de promoción válido.
      operationId: claimCodePromotion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  example: "ADTEST5PENF3###2hxvtp"
      responses:
        "200":
          description: Valid Session successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimCodePromotionResponse"
        "400":
          description: Invalid or missing data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingParameters:
                  summary: Parámetros faltantes
                  value:
                    message: "Completar los campos obligatorios"
                invalidRefreshToken:
                  summary: Código Invalido
                  value:
                    message: "El código ingresado no es válido"
                codeAlreadyClaimed:
                  summary: Código ya reclamado
                  value:
                    message: "El código ya ha sido reclamado"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sin Autorización
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado

  /data/cancel-user-promotion:
    post:
      tags:
        - data
      summary: Cancelar promoción de usuario
      description: Cancela una promoción de usuario enviando el código correspondiente.
      operationId: cancelUserPromotion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: integer
                  example: 3131312
              required:
                - code
      responses:
        "200":
          description: Valid Session successfully
          content:
            application/json:
              schema:
                type: object
                properties: 
                    company:
                      type: string
                      example: ""
                    event:
                      type: string
                      example: "cancelUserPromotion"
                    ip:
                      type: string
                      example: "181.224.239.6"
                    result:
                      type: string
                      example: "OK"
                    type:
                      type: string
                      example: "cancelUserPromotion"
        "400":
          description: Invalid or missing data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingParameters:
                  summary: Parámetros faltantes
                  value:
                    message: "Completar los campos obligatorios"
                invalidRefreshToken:
                  summary: Código Invalido
                  value:
                    message: "El código ingresado no es válido"
        '401':
          description: Error de autenticación/autorización
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Sin Autorización"
        '500':
          description: Error inesperado en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Ocurrio un error inesperado"

  /data/user-files:
    get:
      summary: Listar archivos de usuario
      description: Retorna los archivos asociados al usuario autenticado.
      operationId: getUserFiles
      tags:
        - data
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Archivos obtenidos exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    example: getUserFiles
                  company:
                    type: string
                    example: ""
                  event:
                    type: string
                    example: getUserFiles
                  ip:
                    type: string
                    example: 35.94.210.51
                  result:
                    type: string
                    example: OK
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        result:
                          type: string
                          example: OK
                        db:
                          type: integer
                          example: 2
                        user:
                          type: integer
                          example: 410109
                        file:
                          type: integer
                          example: 213808
                        company:
                          type: string
                          example: ACP
                        status:
                          type: string
                          example: APPROVED
                        created_date:
                          type: string
                          format: date-time
                          example: 2025-08-08 21:35:50
                        type:
                          type: string
                          example: VERIFICATION
                        sub_type:
                          type: string
                          nullable: true
                          example: DNI
                        side:
                          type: string
                          nullable: true
                          example: FRONT
                        expiration_date:
                          type: string
                          nullable: true
                          example: 2030-04-28
                        path:
                          type: string
                          example: ACP/410/410109/213734_dni frontal.jpeg
                        comments:
                          type: string
                          example: "VALIDADO POR METAMAP\n08 ago, 2025 15:41\n..."
                        extra:
                          type: string
                          nullable: true
                          example: null
                        reviewer:
                          type: integer
                          example: 112577
                        review_date:
                          type: string
                          format: date-time
                          example: 2025-08-08 21:05:26
                        ip:
                          type: string
                          example: 181.224.239.6
                        payment_account:
                          type: integer
                          nullable: true
                          example: 162814
        '401':
          description: Token inválido o no proporcionado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Unauthorized"
        '500':
          description: Error inesperado en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Ocurrió un error inesperado"

  /data/user-personal-preferences:
    get:
      tags:
        - data
      summary: Listar todas las preferencias del usuario
      description: >
        Devuelve el listado de las preferencias seleccionadas por el usuario
        Requiere autenticación mediante **Bearer Token**.
      operationId: getUserPersonalPreferences
      responses:
        "200":
          description: successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPersonalPreferencesResponse"
        "400":
          description: Invalid or missing data
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Completar los campos obligatorios
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado
  
  /data/users-personal-preferences:
    get:
      tags:
        - data
      summary: Listar todas las preferencias
      description: >
        Devuelve un listado con todas las preferencias que el usuario puede seleccionar.
      operationId: getUsersPersonalPreferences
      responses:
        "200":
          description: successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersPersonalPreferencesResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado
  
  /data/validate-session:
    get:
      tags:
        - data
      summary: válidar la sesión del usuario logueado
      description: >
        Devuelve un detalle del usuario siempre y cuando su sesión sea valida
      operationId: validateSession
      responses:
        "200":
          description: successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateSessionResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado

  /data/Operations-history:
    get:
      tags:
        - data
      summary: Listar las operaciones del usuario
      description: |
        Este servicio obtiene el historial de operaciones de un usuario autenticado.
        Los parámetros permiten filtrar por rango de fechas, estado y tipo de operación,
        así como manejar paginación con `init` y `end`.
        
        Status:
          - SUCCESS
          - CANCELLED
          - DENIED
          - PROCESSED

        Type: 
          - MANUAL
          - PAYOUT
          - REDEEM
          - DEPOSIT
          - WINNING
          - WAGER
      operationId: getOperationsHistory
      parameters:
        - name: init
          in: query
          required: true
          description: Especifica desde que posición tomara los registros de la colección
          schema:
            type: integer
            example: 0
        - name: end
          in: query
          required: true
          description: Especifica hasta que posición tomara los registros de la colección
          schema:
            type: integer
            example: 20
        - name: op_date_init
          in: query
          required: true
          description: Especifica desde que fecha tomara los registros (formato `YYYY-MM-DD HH:mm:ss`)
          schema:
            type: string
            example: 2025-01-01 05:00:00
        - name: op_date_end
          in: query
          required: true
          description: Especifica hasta que fecha tomara los registros (formato `YYYY-MM-DD HH:mm:ss`)
          schema:
            type: string
            example: 2025-10-12 23:59:59
        - name: status
          in: query
          required: false
          description: Especifica el estado con el cual se quiere que se filtre, puede especificarse varios estados separados por coma(,)
          schema:
            type: string
            example: SUCCESS,CANCELLED
        - name: type
          in: query
          required: false
          description: Especifica el tipo con el cual se quiere que se filtre, puede especificarse varios estados separados por coma(,)
          schema:
            type: string
            example: PAYOUT
      responses:
        '200':
          description: Listado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOperationsResponse'
        '400':
          description: Parámetro inválido o fragmento no válido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidInit:
                  summary: init inválido
                  value:
                    message: "El parámetro 'init' no es válido"
                invalidEnd:
                  summary: end inválido
                  value:
                    message: "El parámetro 'end' no es válido"
                InvalidDateInit:
                  summary: op_date_init inválido
                  value:
                    message: "El parámetro 'op_date_init' no es válido"
                InvalidDateEnd:
                  summary: op_date_end inválido
                  value:
                    message: "El parámetro 'op_date_end' no es válido"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sin Autorización
        '500':
          description: Error inesperado en la ejecución del servicio.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Ocurrió un error inesperado"

  /data/transactions-history:
    get:
      tags:
        - data
      summary: Listar las operaciones del usuario
      description: |
        Este servicio obtiene las transacciones de un usuario autenticado.
        Los parámetros permiten filtrar por rango de fechas, estado y tipo de operación,
        así como manejar paginación con `init` y `end`.
      operationId: getTransactionsHistory
      parameters:
        - name: init
          in: query
          required: true
          description: Especifica desde que posición tomara los registros de la colección
          schema:
            type: integer
            example: 0
        - name: end
          in: query
          required: true
