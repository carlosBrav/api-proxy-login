  /providers/playtech/internal/pokerLogin:
    post:
      tags:
        - playtech
      summary: Servicio que genera un 'username' y 'externalToken' temporal
      description: Endpoint de tipo login, que se encarga de generar un username y un token externo temporal (externalToken), necesarios para iniciar una sesión de juego en la plataforma de Poker del proveedor Playtech.
      operationId: pokerLogin
      responses:
        "200":
          description: Valid Session successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: "OK"
                    description: Estado de la operación
                  playtechUser:
                    type: string
                    example: "2.445226"
                    description: Username temporal del usuario para el proveedor
                  externalToken:
                    type: string
                    example: "2-ACP-b5d17160-a033-4748-b3c8-987fa9fa6b1a"
                    description: Token temporal para poder authenticarse
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sin Autorización
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado

  /providers/playtech/endpoint/authenticate:
    post:
      tags:
        - playtech
      summary: Servicio que genera un 'Token' para el uso del juego de poker
      description: Endpoint authenticate, que se encarga de generar datos de sesión para el juego de Poker ligado con el proveedor Playtech.
      operationId: authenticate
      responses:
        "200":
          description: Valid Session successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                    example: "e9ccd456-4c6a-47b3-922f-66a5e5e18518"
                    description: Identificador del request
                  countryCode:
                    type: string
                    example: "PE"
                    description: Código de País del usuario
                  currencyCode:
                    type: string
                    example: "PEN"
                    description: Código del tipo de moneda de la cuenta del usuario
                  permanentExternalToken:
                    type: string
                    example: "2-ACP-ps-45dfcac1-9bca-4628-8b5d-07818cfc257d"
                    description: Token permanente para navegar por el lobby del proveedor
                  username:
                    type: string
                    example: "2.445226"
                    description: Nombre de usuario temporal dentro del lobby del proveedor
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sin Autorización
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ocurrió un error inesperado

